<html>
  <head>
    <title>nablify.com</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicons/site.webmanifest">
    <link rel="mask-icon" href="/assets/favicons/safari-pinned-tab.svg" color="#222d3f">
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico">
    <meta name="msapplication-TileColor" content="#f7f4f3">
    <meta name="msapplication-config" content="/assets/favicons/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <style>
        body {
            background: #f7f4f3;
        }
        @media only screen and (max-width: 1000px) {
            .definition {
                width: 90%;
            }
            .logo {
                width: 35%;
            }
            div {
                padding-top: 8%;
                text-align: center;
            }
        }
        @media only screen and (min-width: 1000px) {
            .definition {
                width: 50%;
            }
            .logo {
                width: 15%;
            }
            div {
                padding-top: 5%;
                text-align: center;
            }
        }
    </style>
  </head>
  <body>
    <div>
        <img class="definition" src = "assets/img/definition.svg" alt="nablify definition"/>
    </div>
    <div>
        <img class="logo" src = "assets/img/logo.svg" alt="nablify logo"/>
    </div>
  </body>
</html>
